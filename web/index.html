<script src="linkage-solver.js"></script>
<script>
(function(){
  const svg = document.getElementById('canvas');
  const text = document.getElementById('defText');
  const status = document.getElementById('status');
  // auto-dismiss status text ~2.5s after last change, with fade transition
  (function setupStatusAutoDismiss() {
    let fadeT = null, clearT = null;
    const obs = new MutationObserver(() => {
      if (!status.textContent) return;
      status.classList.remove('fading');
      if (fadeT) clearTimeout(fadeT);
      if (clearT) clearTimeout(clearT);
      fadeT = setTimeout(() => {
        status.classList.add('fading');
        clearT = setTimeout(() => {
          obs.disconnect();
          status.textContent = '';
          status.classList.remove('fading', 'err');
          obs.observe(status, { childList: true, characterData: true, subtree: true });
        }, 700);
      }, 2500);
    });
    obs.observe(status, { childList: true, characterData: true, subtree: true });
  })();
  const coordDisplay = document.getElementById('coordDisplay');

  const VB_W = 900, VB_H = 1100;

  const state = {
    links: [],
    joints: [],
    currentLink: null,
    nextLinkId: 0,
    showGrid: true,
    snap: true,
    snapSize: 20,
    labelSize: 24,
    hoverInfo: null,
    drag: null,
    roles: {},
    origin: null,
    restConfig: null,
    showLabels: true,
    selection: null,
    view: { x: 0, y: 0, w: VB_W, h: VB_H }
  };

  let spaceDown = false;
  let gestureActive = false;
  function roundCoord(v) { return Math.round(v * 10) / 10; }

  const STORAGE_KEY = 'fingerSimulator.v1';
  let persistTimer = null;

  function persist() {
    try {
      const data = {
        links: state.links,
        joints: state.joints,
        roles: state.roles,
        origin: state.origin,
        restConfig: state.restConfig,
        nextLinkId: state.nextLinkId,
        view: state.view,
        labelSize: state.labelSize,
        showGrid: state.showGrid,
        showLabels: state.showLabels,
        snap: state.snap,
        snapSize: state.snapSize
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (_) { /* quota / privacy mode — silently ignore */ }
  }

  function schedulePersist() {
    if (persistTimer) clearTimeout(persistTimer);
    persistTimer = setTimeout(persist, 200);
  }

  function loadPersisted() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const d = JSON.parse(raw);
      if (Array.isArray(d.links)) state.links = d.links;
      if (Array.isArray(d.joints)) state.joints = d.joints;
      if (d.roles && typeof d.roles === 'object') state.roles = d.roles;
      if (d.origin !== undefined) state.origin = d.origin;
      if (d.restConfig && d.restConfig.positions) state.restConfig = d.restConfig;
      if (typeof d.nextLinkId === 'number') state.nextLinkId = d.nextLinkId;
      if (d.view && typeof d.view.w === 'number') state.view = d.view;
      if (typeof d.labelSize === 'number') state.labelSize = d.labelSize;
      if (typeof d.showGrid === 'boolean') state.showGrid = d.showGrid;
      if (typeof d.showLabels === 'boolean') state.showLabels = d.showLabels;
      if (typeof d.snap === 'boolean') state.snap = d.snap;
      if (typeof d.snapSize === 'number') state.snapSize = d.snapSize;
      return true;
    } catch (_) { return false; }
  }

  let dragEndTime = 0;
  const history = [];
  const HISTORY_MAX = 100;

  function updateRestButtons() {
    const resetBtn = document.getElementById('resetBtn');
    const captureBtn = document.getElementById('captureBtn');
    const has = !!state.restConfig;
    if (resetBtn) { resetBtn.disabled = !has; resetBtn.style.opacity = has ? '1' : '0.4'; }
    if (captureBtn) captureBtn.classList.toggle('primary', has);
  }

  function snapshot() {
    const cloneLink = l => ({
      name: l.name, color: l.color,
      points: Object.fromEntries(Object.entries(l.points).map(([k, v]) => [k, { x: v.x, y: v.y }])),
      order: [...l.order], nextPointId: l.nextPointId
    });
    const cloneRC = rc => rc ? {
      positions: Object.fromEntries(Object.entries(rc.positions).map(([k, v]) => [k, { x: v.x, y: v.y }]))
    } : null;
    return {
      links: state.links.map(cloneLink),
      joints: state.joints.map(j => ({ a: j.a, b: j.b })),
      roles: { ...state.roles },
      origin: state.origin,
      restConfig: cloneRC(state.restConfig),
      currentLink: state.currentLink ? cloneLink(state.currentLink) : null,
      nextLinkId: state.nextLinkId
    };
  }

  function pushHistory() {
    history.push(snapshot());
    if (history.length > HISTORY_MAX) history.shift();
  }

  function restoreSnapshot(s) {
    state.links = s.links;
    state.joints = s.joints;
    state.roles = s.roles;
    state.origin = s.origin || null;
    state.restConfig = s.restConfig || null;
    state.currentLink = s.currentLink;
    state.nextLinkId = s.nextLinkId;
    kinSolverReady = false;
    updateRestButtons();
  }

  const LINK_COLORS = ['#7F77DD', '#D85A30', '#1D9E75', '#EF9F27', '#378ADD', '#D4537E', '#534AB7', '#0F6E56', '#BA7517', '#185FA5'];

  function nextLinkName() { return 'L' + (state.nextLinkId++); }

  function newLink() {
    return {
      name: nextLinkName(),
      color: LINK_COLORS[state.links.length % LINK_COLORS.length],
      points: {},
      order: [],
      nextPointId: 0
    };
  }

  function addPointToLink(link, pos) {
    const local = 'p' + (link.nextPointId++);
    link.points[local] = { x: pos.x, y: pos.y };
    link.order.push(local);
    return local;
  }

  function refOf(linkName, localName) { return linkName + '.' + localName; }
  function parseRef(ref) {
    const idx = ref.indexOf('.');
    return { link: ref.slice(0, idx), point: ref.slice(idx + 1) };
  }
  function getPoint(ref) {
    const r = parseRef(ref);
    const link = state.links.find(l => l.name === r.link) ||
                 (state.currentLink && state.currentLink.name === r.link ? state.currentLink : null);
    if (!link) return null;
    return link.points[r.point];
  }

  function svgCoords(evt, noSnap) {
    const rect = svg.getBoundingClientRect();
    const v = state.view;
    const scale = Math.min(rect.width / v.w, rect.height / v.h);
    const renderedW = v.w * scale, renderedH = v.h * scale;
    const offsetX = (rect.width - renderedW) / 2;
    const offsetY = (rect.height - renderedH) / 2;
    const x = v.x + (evt.clientX - rect.left - offsetX) / scale;
    const y = v.y + (evt.clientY - rect.top - offsetY) / scale;
    if (state.snap && !noSnap) {
      return {
        x: Math.round(x / state.snapSize) * state.snapSize,
        y: Math.round(y / state.snapSize) * state.snapSize
      };
    }
    return { x: Math.round(x * 10) / 10, y: Math.round(y * 10) / 10 };
  }

  function distance(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  // screen px → viewBox units (for constant-pixel hit targets across zoom)
  function pxToView(px) {
    const rect = svg.getBoundingClientRect();
    const v = state.view;
    const scale = Math.min(rect.width / v.w, rect.height / v.h) || 1;
    return px / scale;
  }
  const HIT_PX = 22;

  function findNearPoint(pos, threshold) {
    threshold = threshold || 14;
    let best = null, bestD = threshold;
    const check = (linkName, link) => {
      for (const local in link.points) {
        const d = distance(pos, link.points[local]);
        if (d < bestD) { bestD = d; best = refOf(linkName, local); }
      }
    };
    state.links.forEach(l => check(l.name, l));
    if (state.currentLink) check(state.currentLink.name, state.currentLink);
    return best;
  }

  function findNearSegment(pos, threshold) {
    threshold = threshold || 12;
    for (let li = state.links.length - 1; li >= 0; li--) {
      const link = state.links[li];
      for (let i = 0; i < link.order.length - 1; i++) {
        const a = link.points[link.order[i]];
        const b = link.points[link.order[i + 1]];
        if (!a || !b) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const len2 = dx * dx + dy * dy;
        if (len2 === 0) continue;
        let t = ((pos.x - a.x) * dx + (pos.y - a.y) * dy) / len2;
        t = Math.max(0, Math.min(1, t));
        const cx = a.x + t * dx, cy = a.y + t * dy;
        if (distance(pos, { x: cx, y: cy }) < threshold) return li;
      }
    }
    return -1;
  }

  function jointGroup(ref) {
    const group = new Set([ref]);
    let changed = true;
    while (changed) {
      changed = false;
      state.joints.forEach(j => {
        if (group.has(j.a) && !group.has(j.b)) { group.add(j.b); changed = true; }
        if (group.has(j.b) && !group.has(j.a)) { group.add(j.a); changed = true; }
      });
    }
    return group;
  }

  // Node = a joint group treated as one logical pin.
  // rep is the canonical member (sorted first) used for role storage.
  function getNodeRole(members) {
    for (const r of [...members].sort()) {
      if (state.roles[r]) return state.roles[r];
    }
    return null;
  }

  function setNodeRole(members, role) {
    members.forEach(r => delete state.roles[r]);
    const rep = [...members].sort()[0];
    if (role) state.roles[rep] = role;
  }

  function placeLabel(occupied, x, y, w, h) {
    const offsets = [
      { dx: 12, dy: -14 }, { dx: -w - 12, dy: -14 },
      { dx: 12, dy: 20 }, { dx: -w - 12, dy: 20 },
      { dx: 16, dy: 6 }, { dx: -w - 16, dy: 6 },
      { dx: 12, dy: -32 }, { dx: -w - 12, dy: -32 },
      { dx: 12, dy: 40 }, { dx: -w - 12, dy: 40 }
    ];
    for (const c of offsets) {
      const rect = { x: x + c.dx, y: y + c.dy - h, w, h };
      let hit = false;
      for (const o of occupied) {
        if (rect.x < o.x + o.w && rect.x + rect.w > o.x &&
            rect.y < o.y + o.h && rect.y + rect.h > o.y) { hit = true; break; }
      }
      if (!hit) {
        occupied.push(rect);
        return { x: x + c.dx, y: y + c.dy };
      }
    }
    occupied.push({ x: x + offsets[0].dx, y: y + offsets[0].dy - h, w, h });
    return { x: x + offsets[0].dx, y: y + offsets[0].dy };
  }

  // ── selection + action bar ──

  const actionBar = document.getElementById('actionBar');
  const helpPopover = document.getElementById('helpPopover');
  let helpOpen = false;
  function closeHelp() {
    helpOpen = false;
    helpPopover.classList.add('hidden');
    helpPopover.innerHTML = '';
  }
  function openHelp(items) {
    helpOpen = true;
    const dl = document.createElement('dl');
    for (const [term, desc] of items) {
      const dt = document.createElement('dt'); dt.textContent = term;
      const dd = document.createElement('dd'); dd.textContent = desc;
      dl.appendChild(dt); dl.appendChild(dd);
    }
    helpPopover.innerHTML = '';
    helpPopover.appendChild(dl);
    helpPopover.classList.remove('hidden');
  }
  document.addEventListener('pointerdown', e => {
    if (!helpOpen) return;
    if (e.target.closest('#helpPopover') || e.target.closest('.help-local')) return;
    closeHelp();
  }, true);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && helpOpen) closeHelp();
  });

  function clearSelection() {
    if (state.selection) state.selection = null;
    if (helpOpen) closeHelp();
  }

  function selectPoint(ref) {
    state.selection = { type: 'point', ref };
  }

  function selectLink(name) {
    state.selection = { type: 'link', name };
  }

  function renderActionBar() {
    actionBar.innerHTML = '';
    closeHelp();

    // show bar only when something contextual is happening
    const hasContext = state.drag || state.currentLink || state.selection;
    actionBar.classList.toggle('hidden', !hasContext);
    if (!hasContext) return;

    // drag in progress — keep bar space but show hint
    if (state.drag) {
      const s = document.createElement('span');
      s.className = 'placeholder';
      s.textContent = state.drag.kinematic ? 'simulating…' : 'dragging…';
      actionBar.appendChild(s);
      return;
    }

    const add = (label, onClick, opts) => {
      const b = document.createElement('button');
      b.className = 'btn';
      if (opts && opts.primary) b.classList.add('primary');
      if (opts && opts.danger) b.classList.add('danger');
      if (opts && opts.active) b.classList.add('active');
      if (opts && opts.ghost) b.classList.add('ghost');
      b.textContent = label;
      b.addEventListener('click', e => { e.stopPropagation(); onClick(); });
      actionBar.appendChild(b);
      return b;
    };
    const addLabel = (txt) => {
      const s = document.createElement('span');
      s.className = 'label';
      s.textContent = txt;
      actionBar.appendChild(s);
    };
    const addDivider = () => {
      const d = document.createElement('span');
      d.className = 'divider';
      actionBar.appendChild(d);
    };
    const addHelp = (items) => {
      const b = document.createElement('button');
      b.className = 'btn ghost help-local';
      b.textContent = '?';
      b.addEventListener('click', e => {
        e.stopPropagation();
        if (helpOpen) closeHelp();
        else openHelp(items);
      });
      actionBar.appendChild(b);
    };

    // drawing mode
    if (state.currentLink) {
      addLabel('drawing ' + state.currentLink.name);
      const canFinish = state.currentLink.order.length >= 2;
      const fin = add('✓ finish', () => finishCurrentLink(), { primary: canFinish });
      if (!canFinish) { fin.disabled = true; fin.style.opacity = '0.4'; }
      add('✗ cancel', () => cancelCurrentLink(), { ghost: true });
      return;
    }

    if (state.selection.type === 'sim') {
      addLabel('simulated pose');
      const hasRest = !!state.restConfig;
      add('capture', () => {
        document.getElementById('captureBtn').click();
        clearSelection();
        render();
      });
      const resetBtn = add('reset', () => {
        document.getElementById('resetBtn').click();
        clearSelection();
      });
      if (!hasRest) { resetBtn.disabled = true; resetBtn.style.opacity = '0.4'; }
      addDivider();
      add('done', () => { clearSelection(); render(); }, { ghost: true });
      addHelp([
        ['capture', '지금 포즈를 rest(기준)로 저장.'],
        ['reset', '저장된 rest 포즈로 되돌림.'],
      ]);
      return;
    }

    if (state.selection.type === 'point') {
      const ref = state.selection.ref;
      // verify still exists
      if (!getPoint(ref)) { clearSelection(); return; }
      const members = jointGroup(ref);
      const currentRole = getNodeRole(members);
      addLabel(ref + (currentRole ? ' · ' + currentRole : ''));
      const roles = ['ground', 'input', 'friction'];
      roles.forEach(r => {
        add(r, () => {
          pushHistory();
          setNodeRole(members, currentRole === r ? null : r);
          if (Object.keys(state.roles).length === 0) {
            state.restConfig = null;
            updateRestButtons();
          }
          render();
        }, { active: currentRole === r });
      });
      const isOrigin = state.origin === ref;
      add(isOrigin ? 'clear origin' : 'origin', () => {
        pushHistory();
        state.origin = isOrigin ? null : ref;
        syncText();
        render();
      }, { active: isOrigin });
      addDivider();
      add('new link', () => {
        const ep = getPoint(ref);
        if (!ep) { clearSelection(); render(); return; }
        pushHistory();
        state.currentLink = newLink();
        const localName = addPointToLink(state.currentLink, { x: ep.x, y: ep.y });
        const newRef = refOf(state.currentLink.name, localName);
        state.joints.push({ a: ref, b: newRef });
        clearSelection();
        status.textContent = 'started ' + state.currentLink.name + ' from ' + ref + '.';
        status.classList.remove('err');
        syncText();
        render();
      });
      addDivider();
      add('done', () => { clearSelection(); render(); }, { ghost: true });
      addHelp([
        ['ground', '고정되어 회전하는 점.'],
        ['input', '드래그 핸들 포인트. 잡고 이동 시킬때.'],
        ['friction', '고정은 아닌데 마찰을 줘서 천천히 움직이게.'],
        [isOrigin ? 'clear origin' : 'origin', '이 점을 좌표계 원점으로 지정/해제.'],
        ['new link', '새 링크 만들때 선택한 점을 조인트로 시작.'],
      ]);
      return;
    }

    if (state.selection.type === 'link') {
      const name = state.selection.name;
      const link = state.links.find(l => l.name === name);
      if (!link) { clearSelection(); return; }
      addLabel(name);
      add('delete', () => {
        pushHistory();
        const prefix = name + '.';
        state.links = state.links.filter(l => l !== link);
        state.joints = state.joints.filter(j => !j.a.startsWith(prefix) && !j.b.startsWith(prefix));
        for (const r in state.roles) if (r.startsWith(prefix)) delete state.roles[r];
        if (state.origin && state.origin.startsWith(prefix)) state.origin = null;
        if (Object.keys(state.roles).length === 0) state.restConfig = null;
        kinSolverReady = false;
        clearSelection();
        syncText();
        status.textContent = 'deleted ' + name + '.';
        status.classList.remove('err');
        render();
      }, { danger: true });
      addDivider();
      add('done', () => { clearSelection(); render(); }, { ghost: true });
    }
  }

  function cancelCurrentLink() {
    if (!state.currentLink) return;
    const prefix = state.currentLink.name + '.';
    state.joints = state.joints.filter(j => !j.a.startsWith(prefix) && !j.b.startsWith(prefix));
    state.currentLink = null;
    syncText();
    status.textContent = 'cancelled.';
    status.classList.remove('err');
    render();
  }

  // ── render ──

  function render() {
    svg.innerHTML = '';
    const v = state.view;
    svg.setAttribute('viewBox', v.x + ' ' + v.y + ' ' + v.w + ' ' + v.h);
    const pointLabelSize = state.labelSize;
    const linkLabelSize = state.labelSize;
    const occupied = [];

    // screen-to-viewbox scale (for items that should stay constant pixel size across zoom)
    const rect = svg.getBoundingClientRect();
    const viewScale = Math.min(rect.width / v.w, rect.height / v.h) || 1;
    const px = (n) => n / viewScale;

    // origin reference for grid labels / text display
    const originPos = state.origin ? getPoint(state.origin) : null;

    // effective visible viewBox — expands v.* to include letterbox area under xMidYMid meet
    let visX = v.x, visY = v.y, visW = v.w, visH = v.h;
    if (rect.width > 0 && rect.height > 0) {
      const aspectScreen = rect.width / rect.height;
      const aspectVB = v.w / v.h;
      if (aspectScreen > aspectVB) {
        visW = v.h * aspectScreen;
        visX = v.x - (visW - v.w) / 2;
      } else if (aspectScreen < aspectVB) {
        visH = v.w / aspectScreen;
        visY = v.y - (visH - v.h) / 2;
      }
    }

    // grid — spans full visible area (including letterbox), negative coords allowed
    if (state.showGrid) {
      const minorStep = 20, majorStep = 100;
      const x0 = Math.floor(visX / minorStep) * minorStep;
      const x1 = Math.ceil((visX + visW) / minorStep) * minorStep;
      const y0 = Math.floor(visY / minorStep) * minorStep;
      const y1 = Math.ceil((visY + visH) / minorStep) * minorStep;
      const tooManyMinor = (x1 - x0) / minorStep > 400 || (y1 - y0) / minorStep > 400;
      const step = tooManyMinor ? majorStep : minorStep;
      for (let x = x0; x <= x1; x += step) {
        const isMajor = x % majorStep === 0;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x); line.setAttribute('y1', y0);
        line.setAttribute('x2', x); line.setAttribute('y2', y1);
        line.setAttribute('stroke', 'var(--border)');
        line.setAttribute('stroke-width', isMajor ? '0.6' : '0.3');
        line.setAttribute('opacity', isMajor ? '0.6' : '0.35');
        svg.appendChild(line);
      }
      for (let y = y0; y <= y1; y += step) {
        const isMajor = y % majorStep === 0;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x0); line.setAttribute('y1', y);
        line.setAttribute('x2', x1); line.setAttribute('y2', y);
        line.setAttribute('stroke', 'var(--border)');
        line.setAttribute('stroke-width', isMajor ? '0.6' : '0.3');
        line.setAttribute('opacity', isMajor ? '0.6' : '0.35');
        svg.appendChild(line);
      }
    }

    // link segments
    const drawLink = (link, ghost) => {
      const opacity = ghost ? 0.55 : 0.9;
      const dash = ghost ? '6 3' : 'none';
      for (let i = 0; i < link.order.length - 1; i++) {
        const a = link.points[link.order[i]];
        const b = link.points[link.order[i + 1]];
        if (!a || !b) continue;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
        line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
        line.setAttribute('stroke', link.color);
        line.setAttribute('stroke-width', '6');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('opacity', opacity);
        if (dash !== 'none') line.setAttribute('stroke-dasharray', dash);
        svg.appendChild(line);
      }
    };
    state.links.forEach(l => drawLink(l, false));
    if (state.currentLink) drawLink(state.currentLink, true);

    // hover preview line (while building)
    if (state.currentLink && state.currentLink.order.length > 0 && state.hoverInfo) {
      const lastLocal = state.currentLink.order[state.currentLink.order.length - 1];
      const lastP = state.currentLink.points[lastLocal];
      if (lastP) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', lastP.x); line.setAttribute('y1', lastP.y);
        line.setAttribute('x2', state.hoverInfo.pos.x); line.setAttribute('y2', state.hoverInfo.pos.y);
        line.setAttribute('stroke', state.currentLink.color);
        line.setAttribute('stroke-width', '2');
        line.setAttribute('opacity', '0.4');
        line.setAttribute('stroke-dasharray', '3 3');
        svg.appendChild(line);
      }
    }

    // origin marker — prominent filled dot (constant screen size)
    if (state.origin) {
      const op = getPoint(state.origin);
      if (op) {
        const r = px(7);
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', op.x); dot.setAttribute('cy', op.y);
        dot.setAttribute('r', r);
        dot.setAttribute('fill', 'var(--fg)');
        dot.setAttribute('opacity', '0.85');
        svg.appendChild(dot);
      }
    }

    // joint rings
    const drawnGroups = new Set();
    state.joints.forEach(j => {
      const group = [...jointGroup(j.a)].sort().join('|');
      if (drawnGroups.has(group)) return;
      drawnGroups.add(group);
      const p = getPoint(j.a);
      if (!p) return;
      const size = jointGroup(j.a).size;
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring.setAttribute('cx', p.x); ring.setAttribute('cy', p.y);
      ring.setAttribute('r', 10 + size * 2);
      ring.setAttribute('fill', 'var(--info-bg)');
      ring.setAttribute('stroke', 'var(--info-border)');
      ring.setAttribute('stroke-width', '1.8');
      ring.setAttribute('opacity', '0.75');
      svg.appendChild(ring);
    });

    // link name labels
    if (!state.showLabels) { /* skip */ } else state.links.forEach(link => {
      if (link.order.length < 2) return;
      const a = link.points[link.order[0]];
      const b = link.points[link.order[1]];
      if (!a || !b) return;
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy) || 1;
      const offsetDist = linkLabelSize * 0.9;
      const px = -dy / len * offsetDist;
      const py = dx / len * offsetDist;
      const tx = mx + px, ty = my + py;
      const w = link.name.length * linkLabelSize * 0.65;
      const h = linkLabelSize;
      occupied.push({ x: tx - w / 2, y: ty - h, w, h });

      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', tx - w / 2 - 5);
      bg.setAttribute('y', ty - h - 1);
      bg.setAttribute('width', w + 10);
      bg.setAttribute('height', h + 4);
      bg.setAttribute('rx', 4);
      bg.setAttribute('fill', 'none');
      svg.appendChild(bg);

      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', tx);
      t.setAttribute('y', ty);
      t.setAttribute('font-size', linkLabelSize);
      t.setAttribute('fill', link.color);
      t.setAttribute('font-family', 'var(--mono)');
      t.setAttribute('font-weight', '700');
      t.setAttribute('text-anchor', 'middle');
      t.textContent = link.name;
      svg.appendChild(t);
    });

    // point dots + labels
    const selectedGroup = (state.selection && state.selection.type === 'point' && getPoint(state.selection.ref))
      ? jointGroup(state.selection.ref) : null;

    const drawPoints = (link) => {
      for (const local of link.order) {
        const p = link.points[local];
        const ref = refOf(link.name, local);
        const role = getNodeRole(jointGroup(ref));

        if (selectedGroup && selectedGroup.has(ref)) {
          const halo = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          halo.setAttribute('cx', p.x); halo.setAttribute('cy', p.y);
          halo.setAttribute('r', px(HIT_PX));
          halo.setAttribute('fill', 'none');
          halo.setAttribute('stroke', 'var(--fg)');
          halo.setAttribute('stroke-width', px(1.5));
          halo.setAttribute('opacity', '0.45');
          svg.appendChild(halo);
        }

        if (role === 'ground') {
          // ground: filled circle + triangle base
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
          c.setAttribute('r', 8);
          c.setAttribute('fill', link.color);
          c.setAttribute('stroke', 'var(--fg)');
          c.setAttribute('stroke-width', '1.5');
          svg.appendChild(c);
          const tri = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          tri.setAttribute('d', 'M' + (p.x - 13) + ',' + (p.y + 16) +
            ' L' + (p.x + 13) + ',' + (p.y + 16) +
            ' L' + p.x + ',' + (p.y + 30) + ' Z');
          tri.setAttribute('fill', 'none');
          tri.setAttribute('stroke', link.color);
          tri.setAttribute('stroke-width', '1.5');
          svg.appendChild(tri);
          for (let hi = -8; hi <= 8; hi += 4) {
            const hl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            hl.setAttribute('x1', p.x + hi); hl.setAttribute('y1', p.y + 31);
            hl.setAttribute('x2', p.x + hi - 5); hl.setAttribute('y2', p.y + 37);
            hl.setAttribute('stroke', link.color);
            hl.setAttribute('stroke-width', '1');
            svg.appendChild(hl);
          }
        } else if (role === 'input') {
          // input: blue filled circle + arrow
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
          c.setAttribute('r', 8);
          c.setAttribute('fill', 'var(--info-border)');
          c.setAttribute('stroke', 'var(--fg)');
          c.setAttribute('stroke-width', '1.5');
          svg.appendChild(c);
          const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          arrow.setAttribute('d', 'M' + (p.x - 16) + ',' + (p.y - 28) +
            ' L' + p.x + ',' + (p.y - 16) +
            ' L' + (p.x + 16) + ',' + (p.y - 28));
          arrow.setAttribute('fill', 'none');
          arrow.setAttribute('stroke', 'var(--info-border)');
          arrow.setAttribute('stroke-width', '2.5');
          arrow.setAttribute('stroke-linecap', 'round');
          svg.appendChild(arrow);
        } else if (role === 'friction') {
          // friction: dashed circle
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
          c.setAttribute('r', 8);
          c.setAttribute('fill', 'var(--bg)');
          c.setAttribute('stroke', link.color);
          c.setAttribute('stroke-width', '2');
          c.setAttribute('stroke-dasharray', '4 3');
          svg.appendChild(c);
          const c2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c2.setAttribute('cx', p.x); c2.setAttribute('cy', p.y);
          c2.setAttribute('r', 4);
          c2.setAttribute('fill', link.color);
          c2.setAttribute('opacity', '0.5');
          svg.appendChild(c2);
        } else {
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
          c.setAttribute('r', 8);
          c.setAttribute('fill', 'var(--bg)');
          c.setAttribute('stroke', link.color);
          c.setAttribute('stroke-width', '2');
          svg.appendChild(c);
        }

        if (state.showLabels) {
          const lw = ref.length * pointLabelSize * 0.6;
          const lh = pointLabelSize;
          const lpos = placeLabel(occupied, p.x, p.y, lw, lh);

          const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          bg.setAttribute('x', lpos.x - 4);
          bg.setAttribute('y', lpos.y - lh);
          bg.setAttribute('width', lw + 8);
          bg.setAttribute('height', lh + 3);
          bg.setAttribute('rx', 3);
          bg.setAttribute('fill', 'none');
          svg.appendChild(bg);

          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.setAttribute('x', lpos.x);
          t.setAttribute('y', lpos.y - 3);
          t.setAttribute('font-size', pointLabelSize);
          t.setAttribute('fill', 'var(--fg2)');
          t.setAttribute('font-family', 'var(--mono)');
          t.setAttribute('font-weight', '600');
          t.textContent = ref;
          svg.appendChild(t);
        }
      }
    };
    state.links.forEach(drawPoints);
    if (state.currentLink) drawPoints(state.currentLink);

    // drift violation highlight
    if (state.drag && state.drag.hitLimit && state.drag.driftPos) {
      const dp = state.drag.driftPos;
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring.setAttribute('cx', dp.x); ring.setAttribute('cy', dp.y);
      ring.setAttribute('r', 18);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#e04040');
      ring.setAttribute('stroke-width', '2.5');
      ring.setAttribute('opacity', '0.9');
      svg.appendChild(ring);
      const ring2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring2.setAttribute('cx', dp.x); ring2.setAttribute('cy', dp.y);
      ring2.setAttribute('r', 24);
      ring2.setAttribute('fill', 'none');
      ring2.setAttribute('stroke', '#e04040');
      ring2.setAttribute('stroke-width', '1');
      ring2.setAttribute('stroke-dasharray', '4 3');
      ring2.setAttribute('opacity', '0.5');
      svg.appendChild(ring2);
    }

    // drag-to-joint preview
    if (state.drag && state.drag.snapTarget && state.drag.moved) {
      const tp = state.drag.snapTarget.pos;
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring.setAttribute('cx', tp.x); ring.setAttribute('cy', tp.y);
      ring.setAttribute('r', 20);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', 'var(--info-border)');
      ring.setAttribute('stroke-width', '3');
      ring.setAttribute('stroke-dasharray', '5 4');
      svg.appendChild(ring);
      const jt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      jt.setAttribute('x', tp.x); jt.setAttribute('y', tp.y + 38);
      jt.setAttribute('font-size', '16');
      jt.setAttribute('fill', 'var(--info-border)');
      jt.setAttribute('font-family', 'var(--mono)');
      jt.setAttribute('font-weight', '700');
      jt.setAttribute('text-anchor', 'middle');
      jt.textContent = 'joint \u2192 ' + state.drag.snapTarget.ref;
      svg.appendChild(jt);
    }

    // hover indicators
    if (state.hoverInfo) {
      if (state.hoverInfo.existingRef) {
        const p = getPoint(state.hoverInfo.existingRef);
        if (p) {
          const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
          c.setAttribute('r', 18);
          c.setAttribute('fill', 'none');
          c.setAttribute('stroke', 'var(--info-border)');
          c.setAttribute('stroke-width', '3');
          c.setAttribute('stroke-dasharray', '5 4');
          svg.appendChild(c);
          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.setAttribute('x', p.x); t.setAttribute('y', p.y + 40);
          t.setAttribute('font-size', Math.max(16, pointLabelSize * 0.75));
          t.setAttribute('fill', 'var(--info-border)');
          t.setAttribute('font-family', 'var(--mono)');
          t.setAttribute('font-weight', '700');
          t.setAttribute('text-anchor', 'middle');
          t.textContent = 'joint \u2192 ' + state.hoverInfo.existingRef;
          svg.appendChild(t);
        }
      } else {
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', state.hoverInfo.pos.x); c.setAttribute('cy', state.hoverInfo.pos.y);
        c.setAttribute('r', 5);
        c.setAttribute('fill', 'none');
        c.setAttribute('stroke', 'var(--info-border)');
        c.setAttribute('stroke-width', '1.5');
        c.setAttribute('stroke-dasharray', '2 2');
        svg.appendChild(c);
      }
    }

    schedulePersist();
    renderActionBar();
  }

  // ── serialize / parse ──

  function serialize() {
    const lines = [];
    const originPos = state.origin ? getPoint(state.origin) : null;
    const ox = originPos ? originPos.x : 0;
    const oy = originPos ? originPos.y : 0;
    state.links.forEach(link => {
      lines.push('link ' + link.name + ' [' + link.color + ']:');
      link.order.forEach(local => {
        const p = link.points[local];
        const px = roundCoord(p.x - ox);
        const py = roundCoord(p.y - oy);
        lines.push('  ' + local + ': (' + px + ', ' + py + ')');
      });
      lines.push('');
    });
    if (state.joints.length > 0) {
      lines.push('# joints');
      state.joints.forEach(j => {
        lines.push('joint: ' + j.a + ' = ' + j.b);
      });
    }
    if (state.origin && originPos) {
      lines.push('');
      lines.push('# origin');
      lines.push('origin: ' + state.origin + ' at (' + roundCoord(ox) + ', ' + roundCoord(oy) + ')');
    }
    const roleEntries = Object.entries(state.roles);
    if (roleEntries.length > 0) {
      lines.push('');
      lines.push('# roles');
      roleEntries.forEach(([ref, role]) => {
        lines.push(role + ': ' + ref);
      });
    }
    return lines.join('\n');
  }
  function syncText() { text.value = serialize(); }

  function parse(src) {
    const newLinks = [];
    const newJoints = [];
    const newRoles = {};
    const errors = [];
    let currentLink = null;
    let newOrigin = null;
    let originOffset = { x: 0, y: 0 };
    src.split('\n').forEach((raw, idx) => {
      const line = raw.trim();
      if (!line || line.startsWith('#')) return;

      const om = line.match(/^origin\s*:\s*(\S+)\s+at\s*\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)\s*$/);
      if (om) {
        newOrigin = om[1];
        originOffset = { x: parseFloat(om[2]), y: parseFloat(om[3]) };
        return;
      }

      const lm = line.match(/^link\s+(\S+)\s*(?:\[([^\]]+)\])?\s*:\s*$/);
      if (lm) {
        currentLink = {
          name: lm[1],
          color: lm[2] || LINK_COLORS[newLinks.length % LINK_COLORS.length],
          points: {},
          order: [],
          nextPointId: 0
        };
        newLinks.push(currentLink);
        return;
      }

      const pm = line.match(/^(\S+)\s*:\s*\(\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*\)\s*$/);
      if (pm && currentLink) {
        const local = pm[1];
        currentLink.points[local] = { x: parseFloat(pm[2]), y: parseFloat(pm[3]) };
        currentLink.order.push(local);
        const m = local.match(/^p(\d+)$/);
        if (m) currentLink.nextPointId = Math.max(currentLink.nextPointId, parseInt(m[1]) + 1);
        return;
      }

      const jm = line.match(/^joint\s*:\s*(\S+)\s*=\s*(\S+)\s*$/);
      if (jm) {
        newJoints.push({ a: jm[1], b: jm[2] });
        return;
      }

      const rm = line.match(/^(ground|input|friction)\s*:\s*(\S+)\s*$/);
      if (rm) {
        newRoles[rm[2]] = rm[1];
        return;
      }

      errors.push('line ' + (idx + 1) + ': "' + line + '"');
    });
    // shift parsed point coords by origin offset (origin-relative → world)
    if (newOrigin) {
      newLinks.forEach(l => {
        for (const local in l.points) {
          l.points[local].x += originOffset.x;
          l.points[local].y += originOffset.y;
        }
      });
    }
    return { links: newLinks, joints: newJoints, roles: newRoles, origin: newOrigin, errors };
  }

  function applyText() {
    const r = parse(text.value);
    if (r.errors.length > 0) {
      status.textContent = r.errors.join(' / ');
      status.classList.add('err');
      return;
    }
    state.links = r.links;
    state.joints = r.joints;
    state.roles = r.roles || {};
    state.origin = r.origin || null;
    state.currentLink = null;
    clearSelection();
    let maxL = -1;
    state.links.forEach(l => { const m = l.name.match(/^L(\d+)$/); if (m) maxL = Math.max(maxL, +m[1]); });
    state.nextLinkId = maxL + 1;
    if (Object.keys(state.roles).length > 0) saveRestConfig();
    status.textContent = 'loaded ' + state.links.length + ' links, ' + state.joints.length + ' joints.';
    status.classList.remove('err');
    render();
  }

  // ── kinematics (Newton-Raphson via LinkageSolver) ──

  const kinSolver = new LinkageSolver();
  let kinSolverReady = false;

  function saveRestConfig() {
    // Snap joint-group members to a canonical (sorted-first rep) position before
    // saving, so solver bodies are initialized consistently without drift baked in.
    const canonPos = {};
    const seenGroups = new Set();
    state.links.forEach(link => {
      link.order.forEach(local => {
        const ref = refOf(link.name, local);
        const members = jointGroup(ref);
        const sorted = [...members].sort();
        const key = sorted.join('|');
        if (!seenGroups.has(key)) {
          seenGroups.add(key);
          const repP = getPoint(sorted[0]);
          if (repP) sorted.forEach(r => { canonPos[r] = { x: repP.x, y: repP.y }; });
        }
      });
    });
    const positions = {};
    state.links.forEach(link => {
      link.order.forEach(local => {
        const ref = refOf(link.name, local);
        positions[ref] = canonPos[ref] || { x: link.points[local].x, y: link.points[local].y };
      });
    });
    state.restConfig = { positions };
    kinSolverReady = false;
    updateRestButtons();
  }

  function initKinSolver() {
    kinSolver.clear();
    const rp = state.restConfig.positions;

    // add bodies from REST positions (defines rigid shape — never changes)
    state.links.forEach(link => {
      const pts = link.order.map(local => {
        const ref = refOf(link.name, local);
        const p = rp[ref] || link.points[local];
        return { name: local, x: p.x, y: p.y };
      });
      if (pts.length >= 2) kinSolver.addBody(link.name, pts);
    });

    // Joints are hard constraints — weight must be much higher than input so the solver
    // never sacrifices joint closure to chase the cursor. At kinematic limits the
    // mechanism stops gracefully rather than opening joints and triggering rollback.
    const JOINT_W = 1000;
    state.joints.forEach(j => {
      const a = parseRef(j.a), b = parseRef(j.b);
      if (kinSolver.bodies[a.link] && kinSolver.bodies[b.link]) {
        kinSolver.addJoint(a.link, a.point, b.link, b.point, JOINT_W);
      }
    });

    kinSolverReady = true;
  }

  function solveKinematics() {
    if (!state.restConfig) return;
    if (!kinSolverReady) initKinSolver();

    // reset constraints (bodies & joints persist)
    kinSolver.clearPins();
    kinSolver.fixed = {};

    const GROUND_W = 1000;
    const INPUT_W  = 100;

    const draggedRef = (state.drag && state.drag.kinematic && state.drag.mode === 'point')
      ? refOf(state.links[state.drag.linkIdx].name, state.drag.localName)
      : null;

    // Ground anchors: pin to CURRENT positions (not rest config).
    // When >= 2 ground pts on same body, body is fully determined → compute pose via 2-point IK.
    const groundPerBody = {};
    for (const ref in state.roles) {
      if (state.roles[ref] !== 'ground') continue;
      const cp = getPoint(ref);
      if (!cp) continue;
      const r = parseRef(ref);
      if (!kinSolver.bodies[r.link]) continue;
      if (!groundPerBody[r.link]) groundPerBody[r.link] = [];
      groundPerBody[r.link].push({ local: r.point, pos: { x: cp.x, y: cp.y } });
    }

    for (const bodyName in groundPerBody) {
      const gpts = groundPerBody[bodyName];
      if (gpts.length >= 2) {
        // 2+ direct ground roles → compute body pose from 2 world points (closed-form IK)
        const b = kinSolver.bodies[bodyName];
        const p1 = gpts[0].pos, p2 = gpts[1].pos;
        const lp1 = b.locals[gpts[0].local], lp2 = b.locals[gpts[1].local];
        const worldAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        const localAngle = Math.atan2(lp2.ly - lp1.ly, lp2.lx - lp1.lx);
        b.angle = worldAngle - localAngle;
        const c = Math.cos(b.angle), s = Math.sin(b.angle);
        b.x = p1.x - (lp1.lx * c - lp1.ly * s);
        b.y = p1.y - (lp1.lx * s + lp1.ly * c);
        kinSolver.setFixed(bodyName);
      } else {
        // 1 direct ground role → soft pin at current position
        kinSolver.addPin(bodyName, gpts[0].local, gpts[0].pos, GROUND_W);
      }
    }

    // input pins: only pin the currently-dragged input; others float freely
    for (const ref in state.roles) {
      if (state.roles[ref] !== 'input') continue;
      if (draggedRef && ref !== draggedRef) continue;
      const p = getPoint(ref);
      if (!p) continue;
      const r = parseRef(ref);
      if (!kinSolver.bodies[r.link] || kinSolver.fixed[r.link]) continue;
      kinSolver.addPin(r.link, r.point, { x: p.x, y: p.y }, INPUT_W);
    }

    // friction pins: soft resistance to movement — point can move but resists it
    const FRICTION_W = 8;
    for (const ref in state.roles) {
      if (state.roles[ref] !== 'friction') continue;
      const p = getPoint(ref);
      if (!p) continue;
      const r = parseRef(ref);
      if (!kinSolver.bodies[r.link] || kinSolver.fixed[r.link]) continue;
      kinSolver.addPin(r.link, r.point, { x: p.x, y: p.y }, FRICTION_W);
    }

    kinSolver.solve(500, 1e-8);

    // read back solved positions
    state.links.forEach(link => {
      if (kinSolver.bodies[link.name]) {
        const worldPts = kinSolver.getWorldPoints(link.name);
        link.order.forEach(local => {
          if (worldPts[local]) {
            link.points[local] = { x: worldPts[local].x, y: worldPts[local].y };
          }
        });
      }
    });
  }

  // ── drag helpers ──

  function buildJointMovesForPoint(ref) {
    const group = jointGroup(ref);
    const moves = [];
    group.forEach(gRef => {
      if (gRef === ref) return;
      const p = getPoint(gRef);
      if (p) moves.push({ ref: gRef, orig: { x: p.x, y: p.y } });
    });
    return moves;
  }

  function buildJointMovesForLink(link) {
    const moves = [];
    const seen = new Set();
    for (const local of link.order) {
      const ref = refOf(link.name, local);
      const group = jointGroup(ref);
      group.forEach(gRef => {
        if (parseRef(gRef).link === link.name) return;
        if (seen.has(gRef)) return;
        seen.add(gRef);
        const p = getPoint(gRef);
        if (p) moves.push({ ref: gRef, orig: { x: p.x, y: p.y } });
      });
    }
    return moves;
  }

  function snapshotPoints(link) {
    const snap = {};
    for (const local in link.points) {
      snap[local] = { x: link.points[local].x, y: link.points[local].y };
    }
    return snap;
  }

  function findSnapTarget(draggedLink, draggedLocal) {
    const pos = draggedLink.points[draggedLocal];
    const draggedRef = refOf(draggedLink.name, draggedLocal);
    const group = jointGroup(draggedRef);
    let best = null, bestD = pxToView(HIT_PX);
    state.links.forEach(l => {
      if (l.name === draggedLink.name) return;
      for (const local in l.points) {
        const ref = refOf(l.name, local);
        if (group.has(ref)) continue;
        const d = distance(pos, l.points[local]);
        if (d < bestD) { bestD = d; best = { ref, pos: l.points[local] }; }
      }
    });
    return best;
  }

  function onDragMove(e) {
    if (!state.drag) return;
    const pos = svgCoords(e);
    const oPos = state.origin ? getPoint(state.origin) : null;
    const cdx = oPos ? (pos.x - oPos.x) : pos.x;
    const cdy = oPos ? (pos.y - oPos.y) : pos.y;
    coordDisplay.textContent = Math.round(cdx) + ', ' + Math.round(cdy);

    if (!state.drag.moved) {
      const sdx = e.clientX - state.drag.screenX;
      const sdy = e.clientY - state.drag.screenY;
      if (sdx * sdx + sdy * sdy > 64) {
        state.drag.moved = true;
        // snapshot BEFORE any mutation (skip for kinematic — that's preview, not edit)
        if (!state.drag.kinematic && state.drag.preDragSnapshot) {
          history.push(state.drag.preDragSnapshot);
          if (history.length > HISTORY_MAX) history.shift();
        }
      }
    }

    if (state.drag.moved) {
      const dx = pos.x - state.drag.startPos.x;
      const dy = pos.y - state.drag.startPos.y;
      const link = state.links[state.drag.linkIdx];

      if (state.drag.kinematic) {
        // kinematic mode: use unsnapped coords
        const rawPos = svgCoords(e, true);
        let targetPos;
        if (state.drag.circleCenter) {
          const cx = state.drag.circleCenter.x;
          const cy = state.drag.circleCenter.y;
          const r = state.drag.circleRadius;
          const d = distance(rawPos, state.drag.circleCenter);
          if (d > 0.001) {
            targetPos = {
              x: cx + (rawPos.x - cx) * r / d,
              y: cy + (rawPos.y - cy) * r / d
            };
          } else {
            targetPos = { x: link.points[state.drag.localName].x, y: link.points[state.drag.localName].y };
          }
        } else {
          targetPos = { x: rawPos.x, y: rawPos.y };
        }

        // substep: interpolate input from current to target; rollback if solver diverges
        const cur = link.points[state.drag.localName];
        const sdx = targetPos.x - cur.x;
        const sdy = targetPos.y - cur.y;
        const stepDist = Math.hypot(sdx, sdy);
        const MAX_STEP = 8; // SVG units per solver call
        const nSteps = Math.max(1, Math.ceil(stepDist / MAX_STEP));
        const startX = cur.x, startY = cur.y;
        // all-or-nothing per frame: if any substep fails, restore to frame start
        const MAX_DRIFT = 2.0;
        let hitLimit = false;

        // frame-start snapshot (positions + solver bodies)
        const framePos = {};
        state.links.forEach(sl => {
          sl.order.forEach(lo => {
            framePos[sl.name + '.' + lo] = { x: sl.points[lo].x, y: sl.points[lo].y };
          });
        });
        const frameBodies = {};
        for (const bname in kinSolver.bodies) {
          const b = kinSolver.bodies[bname];
          frameBodies[bname] = { x: b.x, y: b.y, angle: b.angle };
        }

        // Skip branch flip check on first frame after solver re-init (kinSolverReady
        // was false), because re-init resets all angles to 0 — the jump from 0 to
        // solved pose is not a real branch flip.
        const skipFlipCheck = !kinSolverReady;

        const FLIP_THRESHOLD = Math.PI / 3; // 60° per substep = branch flip
        for (let s = 1; s <= nSteps; s++) {
          const t = s / nSteps;
          link.points[state.drag.localName] = {
            x: startX + sdx * t,
            y: startY + sdy * t
          };
          // record angles before solve to detect branch flip
          const preAngles = {};
          for (const bname in kinSolver.bodies) {
            if (!kinSolver.fixed[bname]) preAngles[bname] = kinSolver.bodies[bname].angle;
          }
          solveKinematics();

          // measure physical validity: ground drift (from frame start) + joint separation
          let maxDrift = 0, driftCause = '', driftPos = null;
          for (const ref in state.roles) {
            if (state.roles[ref] !== 'ground') continue;
            const fp = framePos[ref]; const cp = getPoint(ref);
            if (fp && cp) {
              const d = Math.hypot(cp.x - fp.x, cp.y - fp.y);
              if (d > maxDrift) { maxDrift = d; driftCause = 'ground ' + ref + ' drift ' + d.toFixed(1) + 'px'; driftPos = cp; }
            }
          }
          state.joints.forEach(j => {
            const pa = getPoint(j.a), pb = getPoint(j.b);
            if (pa && pb) {
              const d = Math.hypot(pa.x - pb.x, pa.y - pb.y);
              if (d > maxDrift) { maxDrift = d; driftCause = 'joint ' + j.a + '=' + j.b + ' sep ' + d.toFixed(1) + 'px'; driftPos = { x: (pa.x + pb.x) / 2, y: (pa.y + pb.y) / 2 }; }
            }
          });

          // detect branch flip: any free body rotated > FLIP_THRESHOLD in one substep
          if (maxDrift <= MAX_DRIFT && !skipFlipCheck) {
            for (const bname in preAngles) {
              let da = Math.abs(kinSolver.bodies[bname].angle - preAngles[bname]);
              if (da > Math.PI) da = 2 * Math.PI - da;
              if (da > FLIP_THRESHOLD) {
                maxDrift = MAX_DRIFT + 1;
                driftCause = 'branch flip: ' + bname + ' rotated ' + (da * 180 / Math.PI).toFixed(0) + '°';
                driftPos = getPoint(refOf(bname, Object.keys(kinSolver.bodies[bname].locals)[0]));
                break;
              }
            }
          }

          if (maxDrift > MAX_DRIFT) {
            // restore to FRAME START — no partial movement visible
            state.links.forEach(sl => {
              sl.order.forEach(lo => {
                const sv = framePos[sl.name + '.' + lo];
                if (sv) { sl.points[lo].x = sv.x; sl.points[lo].y = sv.y; }
              });
            });
            for (const bname in frameBodies) {
              const b = kinSolver.bodies[bname];
              const bs = frameBodies[bname];
              if (b) { b.x = bs.x; b.y = bs.y; b.angle = bs.angle; }
            }
            hitLimit = true;
            state.drag.driftCause = driftCause;
            state.drag.driftPos = driftPos;
            break;
          }
        }
        state.drag.snapTarget = null;
        state.drag.hitLimit = hitLimit;
      } else if (state.drag.mode === 'point') {
        link.points[state.drag.localName] = {
          x: state.drag.origPos.x + dx,
          y: state.drag.origPos.y + dy
        };
        // magnetic snap to nearby point from other links
        const snap = findSnapTarget(link, state.drag.localName);
        if (snap) {
          link.points[state.drag.localName] = { x: snap.pos.x, y: snap.pos.y };
          const sdx2 = snap.pos.x - state.drag.origPos.x;
          const sdy2 = snap.pos.y - state.drag.origPos.y;
          state.drag.jointMoves.forEach(jm => {
            const r = parseRef(jm.ref);
            const ol = state.links.find(l => l.name === r.link);
            if (ol && ol.points[r.point]) {
              ol.points[r.point].x = jm.orig.x + sdx2;
              ol.points[r.point].y = jm.orig.y + sdy2;
            }
          });
        } else {
          state.drag.jointMoves.forEach(jm => {
            const r = parseRef(jm.ref);
            const ol = state.links.find(l => l.name === r.link);
            if (ol && ol.points[r.point]) {
              ol.points[r.point].x = jm.orig.x + dx;
              ol.points[r.point].y = jm.orig.y + dy;
            }
          });
        }
        state.drag.snapTarget = snap;
      } else {
        for (const local in state.drag.origPoints) {
          link.points[local] = {
            x: state.drag.origPoints[local].x + dx,
            y: state.drag.origPoints[local].y + dy
          };
        }
        state.drag.jointMoves.forEach(jm => {
          const r = parseRef(jm.ref);
          const ol = state.links.find(l => l.name === r.link);
          if (ol && ol.points[r.point]) {
            ol.points[r.point].x = jm.orig.x + dx;
            ol.points[r.point].y = jm.orig.y + dy;
          }
        });
        state.drag.snapTarget = null;
      }

      svg.style.cursor = 'grabbing';
      document.body.style.cursor = 'grabbing';
      state.hoverInfo = null;
      const what = state.drag.mode === 'point'
        ? link.name + '.' + state.drag.localName : link.name;
      if (state.drag.kinematic) {
        if (state.drag.hitLimit) {
          status.textContent = 'sim | ⚠ stopped: ' + (state.drag.driftCause || 'out of range');
          status.classList.add('err');
        } else {
          status.textContent = 'sim | residual: ' + (kinSolver.lastResidual || 0).toFixed(4);
          status.classList.remove('err');
        }
      } else if (state.drag.snapTarget) {
        status.textContent = 'joint \u2192 ' + state.drag.snapTarget.ref;
      } else {
        status.textContent = 'dragging ' + what + '\u2026';
      }
      status.classList.remove('err');
      if (!state.drag.kinematic) syncText();
      render();
    }
  }

  function onDragEnd(e) {
    if (!state.drag) return;
    const didMove = state.drag.moved;
    const wasKinematic = state.drag.kinematic;
    if (didMove) {
      if (wasKinematic) {
        // keep simulated position (no auto-reset)
        status.textContent = 'simulation paused at current position.';
      } else {
        const link = state.links[state.drag.linkIdx];
        if (state.drag.mode === 'point' && state.drag.snapTarget) {
          const draggedRef = refOf(link.name, state.drag.localName);
          const targetRef = state.drag.snapTarget.ref;
          const targetPos = state.drag.snapTarget.pos;
          link.points[state.drag.localName] = { x: targetPos.x, y: targetPos.y };
          const group = jointGroup(draggedRef);
          if (!group.has(targetRef)) {
            const roleA = getNodeRole(group);
            const roleB = getNodeRole(jointGroup(targetRef));
            const exclusive = ['ground', 'input'];
            if (roleA && roleB && roleA !== roleB && exclusive.includes(roleA) && exclusive.includes(roleB)) {
              status.textContent = 'cannot join: conflicting roles (' + roleA + ' vs ' + roleB + ').';
              status.classList.add('err');
            } else {
              state.joints.push({ a: draggedRef, b: targetRef });
              status.textContent = 'joined ' + draggedRef + ' with ' + targetRef + '.';
              status.classList.remove('err');
            }
          } else {
            status.textContent = 'moved ' + draggedRef + '.';
          }
        } else {
          const what = state.drag.mode === 'point'
            ? link.name + '.' + state.drag.localName : link.name;
          status.textContent = 'moved ' + what + '.';
        }
        syncText();
        // non-kinematic drag = shape edit → auto-update rest config
        if (Object.keys(state.roles).length > 0) saveRestConfig();
        else kinSolverReady = false;
      }
      status.classList.remove('err');
      dragEndTime = Date.now();
    }
    state.drag = null;
    svg.style.cursor = 'crosshair';
    document.body.style.cursor = '';
    document.removeEventListener('pointermove', onDragMove);
    document.removeEventListener('pointerup', onDragEnd);
    document.removeEventListener('pointercancel', onDragEnd);
    if (didMove && wasKinematic) state.selection = { type: 'sim' };
    if (didMove) render();
  }

  // ── events ──

  function startPan(e) {
    const rect = svg.getBoundingClientRect();
    const v = state.view;
    const scale = Math.min(rect.width / v.w, rect.height / v.h);
    const startX = e.clientX, startY = e.clientY;
    const startVX = v.x, startVY = v.y;
    svg.style.cursor = 'grabbing';
    document.body.style.cursor = 'grabbing';
    const onMove = (ev) => {
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      v.x = startVX - dx / scale;
      v.y = startVY - dy / scale;
      render();
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
      svg.style.cursor = spaceDown ? 'grab' : 'crosshair';
      document.body.style.cursor = '';
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  }

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const v = state.view;
    const scale = Math.min(rect.width / v.w, rect.height / v.h);
    const renderedW = v.w * scale, renderedH = v.h * scale;
    const offsetX = (rect.width - renderedW) / 2;
    const offsetY = (rect.height - renderedH) / 2;
    const mx = v.x + (e.clientX - rect.left - offsetX) / scale;
    const my = v.y + (e.clientY - rect.top - offsetY) / scale;
    const k = Math.exp(e.deltaY * 0.0015);
    const newW = v.w * k, newH = v.h * k;
    if (newW < 40 || newW > 40000) return;
    v.x = mx - (mx - v.x) * k;
    v.y = my - (my - v.y) * k;
    v.w = newW; v.h = newH;
    render();
  }, { passive: false });

  svg.addEventListener('pointerdown', e => {
    // only primary mouse button, middle, or touch/pen
    if (e.pointerType === 'mouse') {
      if (e.button === 1 || (e.button === 0 && spaceDown)) {
        e.preventDefault();
        startPan(e);
        return;
      }
      if (e.button !== 0) return;
    }
    // gesture mode takes priority (handled in pointer tracker below)
    if (gestureActive) return;
    if (state.currentLink) return;
    const pos = svgCoords(e);

    // 1) near a finished link's point → point drag
    const nearRef = findNearPoint(pos, pxToView(HIT_PX));
    if (nearRef) {
      const role = getNodeRole(jointGroup(nearRef));
      if (role === 'ground') return; // ground points can't be dragged
      const r = parseRef(nearRef);
      const linkIdx = state.links.findIndex(l => l.name === r.link);
      if (linkIdx >= 0) {
        const link = state.links[linkIdx];
        const pp = link.points[r.point];
        const isKinematic = (role === 'input' || role === 'friction') && state.restConfig;

        // for kinematic drag, find circle constraint (direct or joint-linked ground)
        let circleCenter = null, circleRadius = 0;
        if (isKinematic) {
          for (const local of link.order) {
            const lref = refOf(link.name, local);
            if (lref === nearRef) continue;
            const isGround = getNodeRole(jointGroup(lref)) === 'ground';
            if (isGround && state.restConfig.positions[lref]) {
              circleCenter = state.restConfig.positions[lref];
              circleRadius = distance(
                state.restConfig.positions[lref],
                state.restConfig.positions[nearRef]
              );
              break;
            }
          }
        }

        // save positions + solver state at drag start (for Escape and range-limit rollback)
        const savedPositions = {};
        const savedBodies = {};
        if (isKinematic) {
          state.links.forEach(sl => {
            sl.order.forEach(lo => {
              const rf = refOf(sl.name, lo);
              savedPositions[rf] = { x: sl.points[lo].x, y: sl.points[lo].y };
            });
          });
          for (const bname in kinSolver.bodies) {
            const b = kinSolver.bodies[bname];
            savedBodies[bname] = { x: b.x, y: b.y, angle: b.angle };
          }
        }

        state.drag = {
          mode: 'point',
          kinematic: isKinematic,
          circleCenter,
          circleRadius,
          savedPositions,
          savedBodies,
          linkIdx,
          localName: r.point,
          startPos: pos,
          screenX: e.clientX,
          screenY: e.clientY,
          origPos: { x: pp.x, y: pp.y },
          jointMoves: isKinematic ? [] : buildJointMovesForPoint(nearRef),
          moved: false,
          preDragSnapshot: isKinematic ? null : snapshot()
        };
        document.addEventListener('pointermove', onDragMove);
        document.addEventListener('pointerup', onDragEnd);
        document.addEventListener('pointercancel', onDragEnd);
        return;
      }
    }

    // 2) on a segment → link drag
    const segIdx = findNearSegment(pos);
    if (segIdx >= 0) {
      const link = state.links[segIdx];
      state.drag = {
        mode: 'link',
        linkIdx: segIdx,
        startPos: pos,
        screenX: e.clientX,
        screenY: e.clientY,
        origPoints: snapshotPoints(link),
        jointMoves: buildJointMovesForLink(link),
        moved: false,
        preDragSnapshot: snapshot()
      };
      document.addEventListener('pointermove', onDragMove);
      document.addEventListener('pointerup', onDragEnd);
      document.addEventListener('pointercancel', onDragEnd);
    }
  });

  svg.addEventListener('pointermove', e => {
    // touch has no hover concept; keep hover/cursor logic mouse-only
    if (e.pointerType !== 'mouse') return;
    const pos = svgCoords(e);
    const originPos = state.origin ? getPoint(state.origin) : null;
    const dx = originPos ? (pos.x - originPos.x) : pos.x;
    const dy = originPos ? (pos.y - originPos.y) : pos.y;
    coordDisplay.textContent = Math.round(dx) + ', ' + Math.round(dy);

    // drag is handled by document-level listener
    if (state.drag) return;
    if (spaceDown) { svg.style.cursor = 'grab'; return; }

    // hover logic
    const near = findNearPoint(pos, pxToView(HIT_PX));
    if (state.currentLink) {
      // building a link: show joint preview for other links' points
      if (near) {
        const nearLink = parseRef(near).link;
        if (nearLink === state.currentLink.name) {
          state.hoverInfo = { pos, existingRef: null };
        } else {
          state.hoverInfo = { pos, existingRef: near };
        }
      } else {
        state.hoverInfo = { pos, existingRef: null };
      }
      svg.style.cursor = 'crosshair';
    } else {
      // not building: show grab cursor on draggable targets
      state.hoverInfo = { pos, existingRef: null };
      if (near && getNodeRole(jointGroup(near)) === 'ground') {
        svg.style.cursor = 'not-allowed';
      } else if (near || findNearSegment(pos) >= 0) {
        svg.style.cursor = 'grab';
      } else {
        svg.style.cursor = 'crosshair';
      }
    }

    render();
  });

  svg.addEventListener('pointerleave', e => {
    if (e.pointerType !== 'mouse') return;
    if (state.drag) return;
    state.hoverInfo = null;
    coordDisplay.textContent = '-';
    render();
  });

  svg.addEventListener('click', e => {
    if (Date.now() - dragEndTime < 300) return;
    const pos = svgCoords(e);

    // idle mode: tap = select (existing point or segment) or start new link on empty
    if (!state.currentLink) {
      const near = findNearPoint(pos, pxToView(HIT_PX));
      if (near) {
        selectPoint(near);
        status.textContent = 'selected ' + near + '.';
        status.classList.remove('err');
        render();
        return;
      }
      const segIdx = findNearSegment(pos);
      if (segIdx >= 0) {
        selectLink(state.links[segIdx].name);
        status.textContent = 'selected ' + state.links[segIdx].name + '.';
        status.classList.remove('err');
        render();
        return;
      }
      // empty space — clear selection, start a new link
      if (state.selection) {
        clearSelection();
        render();
        return;
      }
      pushHistory();
      state.currentLink = newLink();
      const localName = addPointToLink(state.currentLink, pos);
      const newRef = refOf(state.currentLink.name, localName);
      status.textContent = newRef + ' added to ' + state.currentLink.name;
      status.classList.remove('err');
      syncText();
      render();
      return;
    }

    // drawing mode: add point, join if near another link's point
    pushHistory();
    const near = findNearPoint(pos, pxToView(HIT_PX));
    let joinRef = null;
    if (near) {
      const nearLink = parseRef(near).link;
      if (nearLink !== state.currentLink.name) joinRef = near;
    }
    let pointPos = pos;
    if (joinRef) {
      const ep = getPoint(joinRef);
      if (ep) pointPos = { x: ep.x, y: ep.y };
    }
    const localName = addPointToLink(state.currentLink, pointPos);
    const newRef = refOf(state.currentLink.name, localName);
    if (joinRef) {
      const roleA = getNodeRole(jointGroup(joinRef));
      const roleB = getNodeRole(jointGroup(newRef));
      if (roleA && roleB && roleA !== roleB) {
        status.textContent = 'cannot join: conflicting roles (' + roleA + ' vs ' + roleB + ').';
        status.classList.add('err');
      } else {
        state.joints.push({ a: joinRef, b: newRef });
        status.textContent = newRef + ' joined with ' + joinRef;
        status.classList.remove('err');
      }
    } else {
      status.textContent = newRef + ' added to ' + state.currentLink.name;
    }
    status.classList.remove('err');
    syncText();
    render();
  });

  // suppress native right-click menu on canvas (right-click is not used)
  svg.addEventListener('contextmenu', e => e.preventDefault());

  // ── multi-touch gesture: pinch zoom + 2-finger pan ──

  const activePointers = new Map();
  let pinchStart = null;

  function vbFromScreen(sx, sy, rect, v) {
    const scale = Math.min(rect.width / v.w, rect.height / v.h);
    const offsetX = (rect.width - v.w * scale) / 2;
    const offsetY = (rect.height - v.h * scale) / 2;
    return {
      x: v.x + (sx - rect.left - offsetX) / scale,
      y: v.y + (sy - rect.top - offsetY) / scale
    };
  }

  svg.addEventListener('pointerdown', e => {
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (activePointers.size === 2 && !gestureActive) {
      gestureActive = true;
      // abort any in-progress drag/pan
      if (state.drag) onDragEnd(e);
      const pts = [...activePointers.values()];
      const rect = svg.getBoundingClientRect();
      const mid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
      pinchStart = {
        rect,
        vw: state.view.w,
        vh: state.view.h,
        anchorVb: vbFromScreen(mid.x, mid.y, rect, state.view),
        dist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y)
      };
    }
  }, true);

  svg.addEventListener('pointermove', e => {
    if (!activePointers.has(e.pointerId)) return;
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (!gestureActive || activePointers.size < 2 || !pinchStart) return;
    e.preventDefault();
    const pts = [...activePointers.values()];
    const currMid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
    const currDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
    const k = pinchStart.dist / currDist; // k<1 = zoom in (newW smaller)
    const newW = Math.max(40, Math.min(40000, pinchStart.vw * k));
    const newH = Math.max(40, Math.min(40000, pinchStart.vh * k));
    const rect = pinchStart.rect;
    const newScale = Math.min(rect.width / newW, rect.height / newH);
    const newOffsetX = (rect.width - newW * newScale) / 2;
    const newOffsetY = (rect.height - newH * newScale) / 2;
    state.view.w = newW;
    state.view.h = newH;
    state.view.x = pinchStart.anchorVb.x - (currMid.x - rect.left - newOffsetX) / newScale;
    state.view.y = pinchStart.anchorVb.y - (currMid.y - rect.top - newOffsetY) / newScale;
    render();
  }, true);

  function endGesturePointer(e) {
    if (!activePointers.has(e.pointerId)) return;
    activePointers.delete(e.pointerId);
    if (gestureActive && activePointers.size < 2) {
      gestureActive = false;
      pinchStart = null;
      // suppress the synthetic click that may fire after pointers lift
      dragEndTime = Date.now();
    }
  }
  svg.addEventListener('pointerup', endGesturePointer, true);
  svg.addEventListener('pointercancel', endGesturePointer, true);

  function finishCurrentLink() {
    if (state.currentLink) pushHistory();
    if (state.currentLink && state.currentLink.order.length >= 2) {
      state.links.push(state.currentLink);
      status.textContent = 'finished ' + state.currentLink.name + '.';
    } else if (state.currentLink) {
      const prefix = state.currentLink.name + '.';
      state.joints = state.joints.filter(j => !j.a.startsWith(prefix) && !j.b.startsWith(prefix));
    }
    state.currentLink = null;
    syncText();
    render();
  }

  // ── Escape reset ──

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !spaceDown) {
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'TEXTAREA' || tag === 'INPUT') return;
      spaceDown = true;
      e.preventDefault();
      if (!state.drag) svg.style.cursor = 'grab';
    }
    if (e.key === 'Escape' && state.drag && state.drag.kinematic) {
      const saved = state.drag.savedPositions;
      if (saved) {
        state.links.forEach(link => {
          link.order.forEach(local => {
            const ref = refOf(link.name, local);
            const sp = saved[ref];
            if (sp) { link.points[local].x = sp.x; link.points[local].y = sp.y; }
          });
        });
      }
      state.drag = null;
      svg.style.cursor = 'crosshair';
      document.body.style.cursor = '';
      document.removeEventListener('pointermove', onDragMove);
      document.removeEventListener('pointerup', onDragEnd);
      document.removeEventListener('pointercancel', onDragEnd);
      syncText();
      render();
      status.textContent = 'reset to initial position.';
      status.classList.remove('err');
    }
  });

  document.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      spaceDown = false;
      if (!state.drag) svg.style.cursor = 'crosshair';
    }
  });

  // ── toolbar ──

  document.getElementById('undoBtn').addEventListener('click', () => {
    if (history.length === 0) {
      status.textContent = 'nothing to undo.';
      return;
    }
    restoreSnapshot(history.pop());
    clearSelection();
    syncText();
    status.textContent = 'undone. (' + history.length + ' left)';
    status.classList.remove('err');
    render();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    pushHistory();
    state.links = []; state.joints = []; state.currentLink = null;
    state.nextLinkId = 0; state.roles = {}; state.origin = null;
    state.restConfig = null;
    clearSelection();
    kinSolverReady = false;
    updateRestButtons();
    syncText(); render();
  });

  document.getElementById('gridBtn').addEventListener('click', () => {
    state.showGrid = !state.showGrid; render();
  });

  document.getElementById('labelsBtn').addEventListener('click', () => {
    state.showLabels = !state.showLabels; render();
  });

  document.getElementById('captureBtn').addEventListener('click', () => {
    if (Object.keys(state.roles).length === 0) {
      status.textContent = 'set ground/input roles first.';
      status.classList.add('err');
      return;
    }
    pushHistory();
    saveRestConfig();
    status.textContent = 'rest position captured.';
    status.classList.remove('err');
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!state.restConfig) {
      status.textContent = 'no rest position captured yet.';
      status.classList.add('err');
      return;
    }
    pushHistory();
    const rp = state.restConfig.positions;
    state.links.forEach(link => {
      link.order.forEach(local => {
        const ref = refOf(link.name, local);
        if (rp[ref]) { link.points[local].x = rp[ref].x; link.points[local].y = rp[ref].y; }
      });
    });
    kinSolverReady = false;
    updateRestButtons();
    syncText();
    status.textContent = 'reset to rest position.';
    status.classList.remove('err');
    render();
  });

  const SNAP_SIZES = [20, 10, 0];
  let snapIdx = 0;
  document.getElementById('snapBtn').addEventListener('click', e => {
    snapIdx = (snapIdx + 1) % SNAP_SIZES.length;
    const sz = SNAP_SIZES[snapIdx];
    if (sz === 0) {
      state.snap = false;
      e.target.textContent = 'snap: off';
    } else {
      state.snap = true;
      state.snapSize = sz;
      e.target.textContent = 'snap: ' + sz;
    }
  });

  const labelSlider = document.getElementById('labelSizeSlider');
  const labelVal = document.getElementById('labelSizeVal');
  labelSlider.addEventListener('input', e => {
    state.labelSize = +e.target.value;
    labelVal.textContent = e.target.value;
    render();
  });

  // ── sidebar buttons ──

  document.getElementById('applyBtn').addEventListener('click', applyText);

  document.getElementById('quantizeBtn').addEventListener('click', () => {
    if (state.links.length === 0) return;
    pushHistory();
    const originPos = state.origin ? getPoint(state.origin) : null;
    const ox = originPos ? originPos.x : 0;
    const oy = originPos ? originPos.y : 0;
    // round each point so that (p - origin) is an integer; world coords = integer + origin offset
    const quantize = (p) => {
      const rx = Math.round(p.x - ox) + ox;
      const ry = Math.round(p.y - oy) + oy;
      p.x = rx; p.y = ry;
    };
    state.links.forEach(l => { for (const k in l.points) quantize(l.points[k]); });
    if (state.restConfig) {
      for (const k in state.restConfig.positions) quantize(state.restConfig.positions[k]);
    }
    kinSolverReady = false;
    if (Object.keys(state.roles).length > 0) saveRestConfig();
    syncText();
    status.textContent = 'coords rounded.';
    status.classList.remove('err');
    render();
  });

  document.getElementById('fitBtn').addEventListener('click', () => {
    if (state.links.length === 0) {
      state.view = { x: 0, y: 0, w: VB_W, h: VB_H };
      render();
      return;
    }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    state.links.forEach(l => {
      for (const local in l.points) {
        const p = l.points[local];
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
      }
    });
    if (!isFinite(minX)) { state.view = { x: 0, y: 0, w: VB_W, h: VB_H }; render(); return; }
    const pad = 80;
    const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
    const cw = Math.max(maxX - minX + pad * 2, 300);
    const ch = Math.max(maxY - minY + pad * 2, 300);
    const rect = svg.getBoundingClientRect();
    const aspect = rect.width / rect.height || (VB_W / VB_H);
    let w = cw, h = ch;
    if (w / h < aspect) w = h * aspect; else h = w / aspect;
    state.view = { x: cx - w / 2, y: cy - h / 2, w, h };
    render();
  });

  document.getElementById('copyBtn').addEventListener('click', () => {
    syncText();
    navigator.clipboard.writeText(text.value).then(() => {
      status.textContent = 'copied.';
    });
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    syncText();
    const blob = new Blob([text.value], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'linkage.txt';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('loadBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      text.value = ev.target.result;
      applyText();
    };
    reader.readAsText(file);
  });

  window.addEventListener('resize', render);

  const sidePanel = document.getElementById('sidePanel');
  const sideToggleBtn = document.getElementById('sideToggleBtn');
  function setSideOpen(open) {
    sidePanel.classList.toggle('open', open);
    document.body.classList.toggle('side-open', open);
    sideToggleBtn.classList.toggle('active', open);
  }
  sideToggleBtn.addEventListener('click', () => {
    setSideOpen(!sidePanel.classList.contains('open'));
  });
  document.getElementById('sideCloseBtn').addEventListener('click', () => {
    setSideOpen(false);
  });

  // restore from localStorage if any
  if (loadPersisted()) {
    // sync UI widgets to loaded state
    labelSlider.value = state.labelSize;
    labelVal.textContent = state.labelSize;
    const snapBtn = document.getElementById('snapBtn');
    const cur = state.snap ? state.snapSize : 0;
    snapIdx = SNAP_SIZES.indexOf(cur); if (snapIdx < 0) snapIdx = 0;
    snapBtn.textContent = cur === 0 ? 'snap: off' : 'snap: ' + cur;
    updateRestButtons();
  }
  // persist immediately on unload so last-frame changes aren't lost to debounce
  window.addEventListener('beforeunload', persist);

  syncText();
  render();
})();
</script>
</body>
</html>
